services:
  bring-interface:
    build: .
    image: bring-interface
    container_name: bring-interface
    restart: unless-stopped
    ports:
      # Linke Zahl = Port auf der NAS (per HOST_PORT änderbar), rechte = im Container
      - "${HOST_PORT:-8095}:3000"
    environment:
      BRING_MAIL: ${BRING_MAIL}
      BRING_PASSWORD: ${BRING_PASSWORD}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      PORT: 3000
      DB_PATH: /data/recipes.db
    volumes:
      # DATA_PATH leer  -> benanntes Docker-Volume "bring-data" (portabel, Standard)
      # DATA_PATH gesetzt -> Bind-Mount auf einen Host-Ordner,
      #   z. B. in Portainer: DATA_PATH=/volume2/docker/BRING/data
      - "${DATA_PATH:-bring-data}:/data"

volumes:
  bring-data:
