services:
  bring-interface:
    build: .
    image: bring-interface
    container_name: bring-interface
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      BRING_MAIL: ${BRING_MAIL}
      BRING_PASSWORD: ${BRING_PASSWORD}
      PORT: 3000
      DB_PATH: /data/recipes.db
    volumes:
      # Synology-Bind-Mount: NAS-Ordner -> Container-Datenordner
      - /volume2/docker/BRING/data:/data
